<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albukhr Admin – Permissions</title>

<script src="admin-auth.js"></script>

<script>
/* =====================================
   ALBUKHR ADMIN PERMISSIONS GUARD
===================================== */

(function(){

  const admin = getAdmin();

  /* Not logged in */
  if(!admin){
    window.location.href = "admin-login.html";
    return;
  }

  /* Only Super Admin allowed */
  if(admin.role !== "super_admin"){
    alert("Access Restricted: Super Admin Only");
    window.location.href = "unified-admin-buttons.html";
    return;
  }

})();
      </script>
  
<link rel="stylesheet" href="style.css">

<style>
.admin-wrap{
  padding:16px;
  max-width:900px;
  margin:0 auto;
}

.admin-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}

.admin-header h2{
  color:#0f7a3d;
}

.perm-table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  border-radius:12px;
  overflow:hidden;
}

.perm-table th,
.perm-table td{
  padding:10px;
  font-size:13px;
  border-bottom:1px solid #eee;
  text-align:center;
}

.perm-table th{
  background:#eaf6ee;
  color:#0f7a3d;
}

.role{
  text-align:left;
  font-weight:600;
}

.note{
  font-size:12px;
  color:#666;
  margin-top:12px;
}

localStorage.setItem("albukhr_admin", JSON.stringify({
  id: "ADMIN-001",
  name: "Test Super Admin",
  role: "super_admin"
}));
</style>
</head>

<body>

<header class="header">
  <h1 class="brand">ALBUKHR • Admin</h1>
</header>

<div class="admin-wrap">

  <div class="admin-header">
    <h2>Permissions Matrix</h2>
    <button onclick="adminLogout()">Logout</button>
  </div>

  <table class="perm-table">
    <thead>
      <tr>
        <th>Role</th>
        <th>Dashboard</th>
        <th>Transactions</th>
        <th>External Reviews</th>
        <th>Permissions</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="role">Super Admin</td>
        <td>✅</td>
        <td>✅</td>
        <td>✅</td>
        <td>✅</td>
      </tr>
      <tr>
        <td class="role">Finance Admin</td>
        <td>👁️</td>
        <td>✅</td>
        <td>❌</td>
        <td>❌</td>
      </tr>
      <tr>
        <td class="role">Review Admin</td>
        <td>👁️</td>
        <td>❌</td>
        <td>✅</td>
        <td>❌</td>
      </tr>
      <tr>
        <td class="role">Viewer Admin</td>
        <td>👁️</td>
        <td>👁️</td>
        <td>❌</td>
        <td>❌</td>
      </tr>
    </tbody>
  </table>

  <div class="note">
    👁️ = Read only · ✅ = Full access · ❌ = No access
  </div>

</div>

<!-- AUTH FIRST -->
<script src="admin-auth.js"></script>
<script>
requireRole(["super_admin"]);
</script>

</body>
               </html>
