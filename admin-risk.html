<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALBUKHR Risk Monitor</title>

<style>

body{
font-family:system-ui;
background:#f4f6f8;
margin:0;
}

.header{
background:#111;
color:white;
padding:14px;
font-weight:700;
text-align:center;
}

.card{
background:white;
margin:16px;
padding:16px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,.05);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.stat{
font-size:22px;
font-weight:800;
}

.low{color:#27ae60}
.medium{color:#f39c12}
.high{color:#e74c3c}
.critical{color:#c0392b}

.project{
border-bottom:1px solid #eee;
padding:10px 0;
font-size:13px;
}

/* ===============================
CRITICAL ALERT
=============================== */

.critical-alert{
position:fixed;
top:0;
left:0;
width:100%;
background:#c0392b;
color:white;
text-align:center;
padding:14px;
font-weight:700;
display:none;
z-index:9999;
animation:flash 1s infinite;
}

@keyframes flash{
0%{opacity:1;}
50%{opacity:.3;}
100%{opacity:1;}
  }
</style>

<script src="wallet-core.js"></script>
<script src="staking.js"></script>
<script src="smart-liquidity-engine.js"></script>
<script src="admin-auth.js"></script>

</head>

<!-- CRITICAL ALERT -->
<div id="criticalAlert" class="critical-alert">
⚠️ CRITICAL SYSTEM RISK DETECTED
</div>

<audio id="alertSound">
<source src="alert.mp3" type="audio/mpeg">
</audio>

<body>

<div class="header">
⚠️ ALBUKHR Risk Monitor
</div>

<div class="card">

<h3>System Risk Overview</h3>

<div class="grid">

<div>
Treasury Risk
<div class="stat" id="treasuryRisk">
LOW
</div>
</div>

<div>
Liquidity Risk
<div class="stat" id="liquidityRisk">
LOW
</div>
</div>

<div>
Withdrawal Risk
<div class="stat" id="withdrawRisk">
LOW
</div>
</div>

<div>
Project Risk
<div class="stat" id="projectRisk">
LOW
</div>
</div>

</div>

</div>

<div class="card">

<h3>Project Risk</h3>

<div id="projectRiskList"></div>

</div>

<script>

/* ===============================
ADMIN AUTH GUARD
=============================== */

document.addEventListener("DOMContentLoaded", function(){

/* Allow Roles */

requireRole([
"super_admin",
"finance_admin",
"review_admin",
"compliance_admin"
]);

/* Get Admin */

const admin = getAdmin();

if(!admin){

alert("Admin login required");

window.location.href =
"admin-login.html";

return;

}

});

/* ===============================
PROJECT RISK ENGINE
=============================== */

function getProjectRisk(project){

const treasury =
getProjectTreasuryStatus(project);

const totals =
getProjectTotals(project);

let risk = "LOW";

/* LOW LIQUIDITY */

if(treasury.liquidity < 100){
risk = "MEDIUM";
}

/* HIGH ROI */

const roi =
calculateProjectROI
? calculateProjectROI(project)
: 0;

if(roi > 25){
risk = "HIGH";
}

/* TOO MANY INVESTORS */

if(totals.stakes.length > 50 &&
treasury.liquidity < 200){
risk = "HIGH";
}

return risk;

}

/* ===============================
RENDER PROJECT RISK
=============================== */

function renderProjectRisk(){

const projects = [

"Barsh",
"Labbaika",
"Raheem",
"Urban",
"Khairat",
"Azman",
"Hauwal"

];

const div =
document.getElementById("projectRiskList");

div.innerHTML="";

projects.forEach(p=>{

const risk = getProjectRisk(p);

const treasury =
getProjectTreasuryStatus(p);

const totals =
getProjectTotals(p);

div.innerHTML += `
<div class="project">

<strong>${p}</strong><br>

Liquidity:
${treasury.liquidity.toFixed(2)} Pi<br>

Reserve:
${treasury.reserve.toFixed(2)} Pi<br>

Investors:
${totals.stakes.length}<br>

Risk:
<span class="${risk.toLowerCase()}">
${risk}
</span>

</div>
`;

});

}

/* ===============================
SYSTEM RISK
=============================== */

function renderSystemRisk(){

const treasury =
getAdminTreasury
? getAdminTreasury()
: {treasury:0};

let risk = "LOW";

if(treasury.treasury < 100){
risk = "MEDIUM";
}

if(treasury.treasury < 50){
risk = "HIGH";
}

document.getElementById("treasuryRisk")
.innerText = risk;

}

/* ===============================
INIT
=============================== */

function loadRisk(){

renderProjectRisk();
renderSystemRisk();

}

/* ===============================
CRITICAL RISK DETECTION
=============================== */

function checkCriticalRisk(){

let critical = false;

/* TREASURY */

if(typeof getAdminTreasury === "function"){

const t = getAdminTreasury();

if(t.treasury < 50){
critical = true;
}

}

/* PROJECT LIQUIDITY */

const projects = [
"Barsh",
"Labbaika",
"Raheem",
"Urban",
"Khairat",
"Azman",
"Hauwal"
];

projects.forEach(p=>{

const status =
getProjectTreasuryStatus(p);

if(status.liquidity < 30){
critical = true;
}

});

triggerCriticalAlert(critical);

}

/* ===============================
TRIGGER ALERT
=============================== */

function triggerCriticalAlert(active){

const alert =
document.getElementById("criticalAlert");

const sound =
document.getElementById("alertSound");

if(!alert) return;

if(active){

alert.style.display = "block";

if(sound){
sound.play().catch(()=>{});
}

}else{

alert.style.display = "none";

}

}

loadRisk();
checkCriticalRisk();

setInterval(loadRisk,5000);
setInterval(checkCriticalRisk,5000);
</script>

</body>
  </html>
