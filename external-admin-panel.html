<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALBUKHR – External Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>
body{background:#f3f6f4;font-family:system-ui}
.section{
  max-width:1000px;
  margin:auto;
  padding:16px
}
.card{
  background:#fff;
  border-radius:16px;
  padding:16px;
  margin-bottom:16px
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px
}
.badge{
  display:inline-block;
  padding:4px 10px;
  font-size:11px;
  border-radius:20px;
  font-weight:700;
  background:#fff3cd;
  color:#856404
}
h3{margin:6px 0}
small{color:#666;font-size:12px}
.actions{
  display:flex;
  gap:10px;
  margin-top:14px
}
.btn{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer
}
.approve{
  background:#0f7a3d;
  color:#fff
}
.reject{
  background:#c0392b;
  color:#fff
}
.empty{
  text-align:center;
  color:#777;
  margin-top:40px
}
</style>
</head>

<body>

<header class="header">
  <h1 class="brand">🛡️ External Admin Panel</h1>
</header>

<section class="section">
  <div id="pendingList"></div>
</section>

<section class="section">
<h3>✅ Approved Projects</h3>
<div id="approvedList"></div>
</section>

<section class="section">
<h3>❌ Rejected Projects</h3>
<div id="rejectedList"></div>
</section>

<!-- =============================
     EXTERNAL ENGINE
============================= -->
<script src="staking-external.js"></script>
<script src="external-project-engine.js"></script>

<script>
const pendingBox =
document.getElementById("pendingList");

const approvedBox =
document.getElementById("approvedList");

const rejectedBox =
document.getElementById("rejectedList");

/* ============================= */

function loadDashboard(){

const all =
getExternalProjects();

const pending =
all.filter(p=>p.status==="pending");

const approved =
all.filter(p=>p.status==="approved");

const rejected =
all.filter(p=>p.status==="rejected");

renderList(
pending,
pendingBox,
"pending"
);

renderList(
approved,
approvedBox,
"approved"
);

renderList(
rejected,
rejectedBox,
"rejected"
);

}

/* ============================= */

function renderList(list, box, type){

box.innerHTML = "";

if(!list.length){

box.innerHTML =
"<div class='empty'>No records</div>";

return;

}

list.forEach(p=>{

const div =
document.createElement("div");

div.className = "card";

div.innerHTML = `

<span class="badge">
${type.toUpperCase()}
</span>

<h3>${p.title}</h3>

<small>
<b>Category:</b> ${p.category}
</small><br>

<small>
<b>Owner:</b> ${p.owner}
</small><br><br>

<small>
${p.description || ""}
</small>

<br><br>

<small>
Approved By:
${p.approvedBy || "-"}
</small><br>

<small>
Time:
${new Date(
p.approvedAt || 
p.rejectedAt || 
p.createdAt
).toLocaleString()}
</small>

${type==="pending" ? `

<div class="actions">

<button 
class="btn approve"
onclick="approveProject('${p.projectId}')">

Approve

</button>

<button 
class="btn reject"
onclick="rejectProject('${p.projectId}')">

Reject

</button>

</div>

` : ""}

`;

box.appendChild(div);

});

}

/* ============================= */

function approveProject(id){

if(!confirm("Approve this project?"))
return;

let projects =
getExternalProjects();

projects = projects.map(p=>{

if(p.projectId === id){

p.status = "approved";

p.approvedBy = "admin";

p.approvedAt = Date.now();

}

return p;

});

localStorage.setItem(
"albukhr_external_projects",
JSON.stringify(projects)
);

alert("✅ Project approved");

loadDashboard();

  }

/* ============================= */

function rejectProject(id){

if(!confirm("Reject this project?"))
return;

let projects =
getExternalProjects();

projects = projects.map(p=>{

if(p.projectId === id){

p.status = "rejected";

p.rejectedBy = "admin";

p.rejectedAt = Date.now();

}

return p;

});

localStorage.setItem(
"albukhr_external_projects",
JSON.stringify(projects)
);

alert("❌ Project rejected");

loadDashboard();

  }

/* ============================= */

loadDashboard();
</script>

</body>
</html>
