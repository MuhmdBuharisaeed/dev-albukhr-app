<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALBUKHR Admin – Contributors</title>
<script src="admin-auth.js"></script>
<script>

/* =====================================
   ALBUKHR ADMIN ACCESS GUARD
===================================== */

/* Allow only valid admin roles */
requireRole([
  "super_admin",
  "finance_admin",
  "review_admin"
]);

const admin = getAdmin();

if(!admin){
  window.location.href = "admin-login.html";
}

</script>
<style>
body{font-family:system-ui;background:#f4f7f6;margin:0}
.section{padding:16px}
.card{
  background:#fff;
  border-radius:14px;
  padding:14px;
  margin-bottom:14px
}
.header{
  padding:14px;
  background:#0f7a3d;
  color:#fff;
  font-weight:800
}
.meta{font-size:12px;color:#555;margin-top:6px}
.desc{
  font-size:13px;
  margin-top:8px;
  background:#f6fbf8;
  padding:10px;
  border-radius:10px;
  line-height:1.6
}
img.photo{
  width:90px;
  height:90px;
  border-radius:12px;
  object-fit:cover;
  border:1px solid #ddd;
  margin-top:8px
}
button{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  font-weight:700;
  font-size:12px;
  cursor:pointer;
  margin-right:6px
}
.approve{background:#0f7a3d;color:#fff}
.reject{background:#eee;color:#333}
.disabled{opacity:.6;pointer-events:none}
.approved{color:#0f7a3d;font-weight:800}
.rejected{color:#b02a37;font-weight:800}
.empty{text-align:center;color:#777;padding:20px}

  .invite-btn{
  background:#0f7a3d;
  color:#fff;
}

.copy-btn{
  background:#333;
  color:#fff;
  font-size:11px;
}

.link-box{
  margin-top:8px;
  padding:8px;
  background:#f6fbf8;
  border-radius:8px;
  font-size:11px;
  word-break:break-all;
}
</style>
</head>

<body>

<div class="header">ALBUKHR • Admin Contributor Panel</div>

<div style="padding:16px">
  <button class="invite-btn" onclick="generateInviteToken()">
    🎟 Generate Contributor Invite
  </button>

  <div id="inviteOutput" class="link-box" style="display:none"></div>
</div>
  
<section class="section" id="list"></section>

<script>
/* =========================================
   ALBUKHR ADMIN CONTRIBUTORS ENGINE v2
   - Globally Unique Incremental ID
   - ID Freeze Protection
   - Unlock Separation
========================================= */

const KEY = "albukhr_contributors";
const ALBUKHR_ID_COUNTER_KEY = "albukhr_id_counter";
const box = document.getElementById("list");

/* =========================================
   STORAGE SAFE LAYER
========================================= */

function getList(){
  try{
    return JSON.parse(localStorage.getItem(KEY)) || [];
  }catch{
    return [];
  }
}

function saveList(newList){

  const existing = getList();

  newList.forEach(item => {

    const old = existing.find(e => e.id === item.id);

    /* 🔒 ID Freeze Enforcement */
    if(old && old.idFrozen){

      item.albukhrId = old.albukhrId;
      item.idFrozen  = true;

    }

  });

  localStorage.setItem(KEY, JSON.stringify(newList));
}

/* =========================================
   GLOBAL UNIQUE INCREMENTAL ID
========================================= */

function getNextAlbukhrId(){

  let counter = Number(localStorage.getItem(ALBUKHR_ID_COUNTER_KEY) || 0);

  counter++;

  localStorage.setItem(ALBUKHR_ID_COUNTER_KEY, counter);

  const padded = String(counter).padStart(4,"0");

  const newId = "ALB-INT-" + padded;

  /* Double safety check */
  const list = getList();

  if(list.some(c => c.albukhrId === newId)){
    return getNextAlbukhrId();
  }

  return newId;
}

/* =========================================
   STATUS CONTROL
========================================= */

function setStatus(index,status){

  const list = getList();

  if(list[index].status !== "pending") return;

  list[index].status = status;

  if(status === "approved"){

    list[index].telegramUnlocked = false;
    list[index].internalUnlocked = false;

    /* 🔐 Generate ID only once */
    if(!list[index].albukhrId){

      list[index].albukhrId = getNextAlbukhrId();
      list[index].idFrozen  = true;

    }

  }

  saveList(list);
  render();
}

function generateInviteToken(){

  const token =
    "ALB-INV-" +
    Date.now() +
    "-" +
    crypto.randomUUID().slice(0,8);

  const invite = {
    token: token,
    createdAt: Date.now(),
    expiresAt: Date.now() + (48 * 60 * 60 * 1000),
    used: false
  };

  const invites =
    JSON.parse(localStorage.getItem("albukhr_invites")) || [];

  invites.push(invite);

  localStorage.setItem(
    "albukhr_invites",
    JSON.stringify(invites)
  );

  const link =
    window.location.origin +
    "/submit-albukhrecosystem-form.html?invite=" +
    token;

  const output = document.getElementById("inviteOutput");

  output.style.display = "block";
  output.innerHTML = `
    <b>Secure Invite Link:</b><br>
    ${link}
    <br><br>
    <button class="copy-btn" onclick="copyInviteLink('${link}')">
      📋 Copy Link
    </button>
  `;
}

function copyInviteLink(link){
  navigator.clipboard.writeText(link);
  alert("Invite link copied successfully");
}
  
/* =========================================
   UNLOCK CONTROLS
========================================= */

function unlockTelegram(index){

  const list = getList();

  if(list[index].status !== "approved"){
    alert("Contributor must be approved first");
    return;
  }

  list[index].telegramUnlocked = true;
  saveList(list);
  render();
}

function unlockInternal(index){

  const list = getList();

  if(list[index].status !== "approved"){
    alert("Contributor must be approved first");
    return;
  }

  list[index].internalUnlocked = true;
  saveList(list);
  render();
}

function unlockProjectBuilder(index){

  const list = getList();

  if(list[index].status !== "approved"){
    alert("Contributor must be approved first");
    return;
  }

  list[index].projectCreationUnlocked = true;

  saveList(list);

  render();

}
/* =========================================
   COPY ID
========================================= */

function copyId(index){

  const list = getList();
  const id = list[index].albukhrId;

  if(!id) return;

  navigator.clipboard.writeText(id);
  alert("Albukhr ID copied: " + id);
}

/* =========================================
   RENDER UI
========================================= */

function render(){

  const list = getList();
  box.innerHTML = "";

  if(!list.length){
    box.innerHTML = "<div class='empty'>No contributors yet</div>";
    return;
  }

  list.forEach((c,i)=>{

    const telegramStatus = c.telegramUnlocked
      ? "<span style='color:#0f7a3d;font-weight:700'>Telegram: Unlocked</span>"
      : "<span style='color:#b02a37;font-weight:700'>Telegram: Locked</span>";

    const internalStatus = c.internalUnlocked
      ? "<span style='color:#0f7a3d;font-weight:700'>Internal: Unlocked</span>"
      : "<span style='color:#b02a37;font-weight:700'>Internal: Locked</span>";

     const projectStatus = c.projectCreationUnlocked
  ? "<span style='color:#0f7a3d;font-weight:700'>Project Builder: Unlocked</span>"
  : "<span style='color:#b02a37;font-weight:700'>Project Builder: Locked</span>";

    const idBlock = c.albukhrId ? `
      <div style="margin-top:10px;font-size:12px;background:#f6fbf8;padding:8px;border-radius:8px">
        <b>Albukhr Internal ID:</b>
        <span>${c.albukhrId}</span>
        <button onclick="copyId(${i})" style="margin-left:6px;font-size:10px">
          Copy
        </button>
      </div>
    ` : "";

    box.innerHTML += `
      <div class="card">

        <strong>${c.fullName}</strong>

        <div class="meta">
          📧 ${c.email}<br>
          📞 ${c.phone}<br>
          🌍 ${c.country || "—"}
        </div>

        <img src="${c.photo}" class="photo">

        <div class="desc">
          <b>Skills:</b> ${c.skills}<br><br>
          <b>Experience:</b><br>${c.experience || "—"}<br><br>
          <b>Contribution:</b><br>${c.contribution}
        </div>

        ${idBlock}

        <div style="margin-top:10px;font-size:12px">
        ${telegramStatus}<br>
        ${internalStatus}<br>
        ${projectStatus}
        </div>

        <div style="margin-top:12px">

          ${
            c.status === "pending"
            ? `
              <button class="approve" onclick="setStatus(${i},'approved')">
                Approve
              </button>
              <button class="reject" onclick="setStatus(${i},'rejected')">
                Reject
              </button>
            `
            : c.status === "approved"
            ? `<span class="approved">✓ Approved</span>`
            : `<span class="rejected">✗ Rejected</span>`
          }

          ${
            c.status === "approved"
            ? `
              <button onclick="unlockTelegram(${i})">
                🔓 Unlock Telegram
              </button>

              <button onclick="unlockInternal(${i})">
                🏗 Unlock Internal
              </button>

              <button onclick="unlockProjectBuilder(${i})">
                🚀 Unlock Project Builder
              </button>
            `
            : ""
          }

        </div>

      </div>
    `;
  });
}

render();
</script>

</body>
</html>
