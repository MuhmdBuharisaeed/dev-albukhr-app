<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>External Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>
body{background:#f4f7f5;font-family:system-ui}
.section{max-width:1100px;margin:auto;padding:16px}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
}
.card{
  background:#fff;
  border-radius:16px;
  padding:16px;
}
.stat{
  font-size:26px;
  font-weight:800;
}
.label{font-size:13px;color:#666}
.list{margin-top:10px}
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid #eee;
  font-size:14px;
}
.row:last-child{border-bottom:none}
.badge{
  font-size:11px;
  padding:4px 10px;
  border-radius:20px;
  font-weight:700;
}
.pending{background:#fff3cd;color:#856404}
.approved{background:#e6f4ea;color:#0f7a3d}
.rejected{background:#fdecea;color:#c0392b}
.btn{
  padding:6px 12px;
  font-size:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#0f7a3d;
  color:#fff;
}
.empty{color:#777;text-align:center;padding:12px}
</style>
</head>

<body>

<header class="header">
  <h1 class="brand">🌍 External Projects – Admin Dashboard</h1>
</header>

<section class="section">

  <!-- =============================
       STATS
  ============================== -->
  <div class="grid">
    <div class="card">
      <div class="stat" id="totalCount">0</div>
      <div class="label">Total External Projects</div>
    </div>
    <div class="card">
      <div class="stat" id="pendingCount">0</div>
      <div class="label">Pending Review</div>
    </div>
    <div class="card">
      <div class="stat" id="approvedCount">0</div>
      <div class="label">Approved Projects</div>
    </div>
    <div class="card">
      <div class="stat" id="rejectedCount">0</div>
      <div class="label">Rejected Projects</div>
    </div>
  </div>

  <!-- =============================
       PENDING LIST
  ============================== -->
  <div class="card" style="margin-top:16px">
    <h3>🕒 Pending External Projects</h3>
    <div id="pendingList" class="list"></div>
  </div>

  <!-- =============================
       APPROVED LIST
  ============================== -->
  <div class="card" style="margin-top:16px">
    <h3>✅ Approved Projects</h3>
    <div id="approvedList" class="list"></div>
  </div>

</section>

<!-- EXTERNAL ENGINE -->
<script src="js/external/external-project-engine.js"></script>

<script>
const totalCount = document.getElementById("totalCount");
const pendingCount = document.getElementById("pendingCount");
const approvedCount = document.getElementById("approvedCount");
const rejectedCount = document.getElementById("rejectedCount");

const pendingList = document.getElementById("pendingList");
const approvedList = document.getElementById("approvedList");

/* =============================
   LOAD DASHBOARD
============================= */
function loadDashboard(){
  const all = getExternalProjects();
  const pending = all.filter(p=>p.status==="pending");
  const approved = all.filter(p=>p.status==="approved");
  const rejected = all.filter(p=>p.status==="rejected");

  totalCount.textContent = all.length;
  pendingCount.textContent = pending.length;
  approvedCount.textContent = approved.length;
  rejectedCount.textContent = rejected.length;

  renderList(pending,pendingList,"pending");
  renderList(approved,approvedList,"approved");
}

/* =============================
   RENDER LIST
============================= */
function renderList(list, box, status){
  if(!list.length){
    box.innerHTML = `<div class="empty">No ${status} projects</div>`;
    return;
  }

  box.innerHTML = list.map(p=>`
    <div class="row">
      <div>
        <b>${p.title}</b><br>
        <small>${p.category}</small>
      </div>
      <div>
        <span class="badge ${status}">
          ${status.toUpperCase()}
        </span>
        <button class="btn"
          onclick="openProject('${p.projectId}')">
          View
        </button>
      </div>
    </div>
  `).join("");
}

/* =============================
   OPEN PROJECT
============================= */
function openProject(id){
  window.location.href =
    "external-project-view.html?id=" + id;
}

loadDashboard();
</script>

</body>
</html>
