 <!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Albukhr Project Dashboard</title>

<link rel="stylesheet" href="css/global-header.css">
<link rel="stylesheet" href="global-buttons.css">

<style>

body{
margin:0;
font-family:system-ui;
background:#f4f7f6;
padding-bottom:110px;
}

.header{
background:#0f7a3d;
height:60px;
padding:0 16px;
display:flex;
align-items:center;
justify-content:space-between;
}

.header-left{
display:flex;
align-items:center;
gap:10px;
}

.header-right{
display:flex;
align-items:center;
}

.main-logo{
height:48px;
width:auto;
}

.brand{
color:white;
font-weight:700;
font-size:18px;
letter-spacing:1px;
}

.dashboard{
padding:16px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:16px;
}

/* CARD */

.card{
background:#fff;
padding:16px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.title{
font-size:13px;
color:#666;
margin-bottom:6px;
}

.big{
font-size:22px;
font-weight:800;
color:#0f7a3d;
}

/* FULL CARD */

.card-full{
background:#fff;
padding:16px;
border-radius:14px;
margin-bottom:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

/* INPUT */

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-top:8px;
}

/* BUTTON */

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
background:#0f7a3d;
color:#fff;
font-weight:600;
cursor:pointer;
width:100%;
}

/* HISTORY */

.tx{
display:flex;
justify-content:space-between;
border-top:1px dashed #eee;
padding-top:8px;
margin-top:8px;
font-size:12px;
}

</style>

</head>

<body>

<header class="header">

<div class="header-left">
<img src="file_000000007c187246b1c01967ee086dc4.png" class="main-logo">
<span class="brand">ALBUKHR</span>
</div>

</header>


<div class="dashboard">

<!-- PROJECT NAME -->

<div class="card-full">

<div class="title">Project</div>
<div class="big" id="projectName"></div>
</div>


<!-- STATS -->

<div class="grid">

<div class="card">
<div class="title">Liquidity</div>
<div class="big" id="liquidity">0 Pi</div>
</div>

<div class="card">
<div class="title">Reserve</div>
<div class="big" id="reserve">0 Pi</div>
</div>

<div class="card">
<div class="title">ROI</div>
<div class="big" id="roi">0%</div>
</div>

<div class="card">
<div class="title">Investors</div>
<div class="big" id="investors">0</div>
</div>

<!-- ADD THIS HERE -->

<div class="card">
<div class="title">Status</div>
<div class="big" id="liquidityStatus">LOW</div>
</div>

</div>

<!-- ADD LIQUIDITY -->

<div class="card-full">

<div class="title">Add Liquidity</div>

<input type="number" id="addAmount" placeholder="Amount">

<button onclick="addLiquidity()">
Add Liquidity
</button>

</div>


<!-- INTERNAL WITHDRAW -->

<div class="card-full">

<div class="title">Internal Withdraw</div>

<input type="number" id="withdrawAmount" placeholder="Amount">

<button onclick="withdrawLiquidity()">
Withdraw Liquidity
</button>

</div>


<!-- HISTORY -->

<div class="card-full">

<div class="title">Treasury Activity</div>

<!-- ===============================
PROJECT UPDATES
================================ -->

<div class="card">

<div class="project-title">
📸 Project Updates
</div>

<input 
type="file"
id="projectUpdateImage"
style="
width:100%;
margin-top:8px;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
background:#fff;
"
/>

<textarea
id="projectUpdateText"
placeholder="Describe project progress..."
style="
width:100%;
margin-top:10px;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
min-height:90px;
resize:none;
font-family:system-ui;
"
></textarea>

<button
onclick="uploadProjectUpdate()"
style="margin-top:10px;"
>

Upload Update

</button>

</div>
 
<div id="history"></div>
<div id="projectStakeBox"></div>
</div>

</div>

<script src="wallet-core.js"></script>
<script src="smart-liquidity-engine.js"></script>
<script src="capital-protection-engine.js"></script>
<script src="js/anti-rug-engine.js"></script>
<script src="staking.js"></script>
<script src="js/ownership-engine.js"></script>
<script src="albukhr-project-deployment-engine.js"></script>

<script>

/* ===============================
CORE PROJECTS
=============================== */

const CORE_PROJECTS = [

"Barsh Agro",
"Labbaika Bakery",
"Raheem Pharma",
"Urban Transport",
"Khairat Recycling",
"Azman Chemical",
"Hauwal Maize"

];

/* ===============================
CURRENT PROJECT
=============================== */

const currentProject =
localStorage.getItem("albukhr_current_project");

let isEmptyProject = false;

if(!currentProject){

const email =
localStorage.getItem("albukhr_current_email");

/* allow contributor empty dashboard */

if(email){

isEmptyProject = true;

}else{

alert("Project not found");
window.location.href="marketplace.html";

}

}

/* ===============================
AUTH CHECK
=============================== */

(function(){

if(CORE_PROJECTS.includes(currentProject)){
return;
}

const email =
localStorage.getItem("albukhr_current_email");

if(!email){
alert("Login required");
window.location.href="submit-albukhrecosystem-form.html";
return;
}

const allowed =
localStorage.getItem(
"albukhr_project_dashboard_unlocked_" + email
);

/* Soft auto unlock */

if(!allowed){

/* allow if project exists */

const internal =
JSON.parse(
localStorage.getItem("albukhr_internal_projects")
) || [];

const marketplace =
typeof getMarketplaceProjects === "function"
? getMarketplaceProjects()
: [];

const exists =
internal.some(p=>p.projectName===currentProject) ||
marketplace.some(p=>p.name===currentProject);

/* auto unlock if valid project */

if(exists){

localStorage.setItem(
"albukhr_project_dashboard_unlocked_" + email,
true
);

}else{

alert("Access denied");
window.location.href="submit-albukhrecosystem-form.html";

}

}

})();

/* ===============================
VERIFY OWNER
=============================== */

function verifyOwner(){

if(CORE_PROJECTS.includes(currentProject)){
return;
}

const email =
localStorage.getItem("albukhr_current_email");

let project = null;

/* marketplace */

if(typeof getMarketplaceProjects === "function"){
project =
getMarketplaceProjects()
.find(p=>p.name===currentProject);
}

/* internal */

if(!project){

const internal =
JSON.parse(
localStorage.getItem("albukhr_internal_projects")
) || [];

project =
internal.find(
p=>p.projectName===currentProject
);

}

/* allow internal project */

if(project && !project.creator){

return;

}

/* allow ALBUKHR */

if(
project &&
(
project.creator === "ALBUKHR" ||
project.type === "internal" ||
project.internal === true
)
){
return;
}

if(!project){
alert("Project not registered");
window.location.href="marketplace.html";
return;
}

if(project.creator !== email){
alert("Access denied");
window.location.href="marketplace.html";
}

 }

/* ===============================
UPDATE DASHBOARD
=============================== */

function updateDashboard(){

document.getElementById("projectName").innerText =
currentProject ? currentProject : "No Project Selected";

const statusLabel =
getLiquidityStatus(currentProject);

document.getElementById("liquidityStatus")
.innerText = statusLabel;
 
const status =
currentProject
? getProjectTreasuryStatus(currentProject)
: {liquidity:0,reserve:0} || {
liquidity:0,
reserve:0
};

document.getElementById("liquidity").innerText =
status.liquidity.toFixed(2)+" Pi";

document.getElementById("reserve").innerText =
status.reserve.toFixed(2)+" Pi";

const roi =
calculateProjectROI(currentProject) || 0;

document.getElementById("roi").innerText =
roi.toFixed(2)+"%";

const stakes =
currentProject
? getAllStakesMerged()
.filter(s =>
(s.project || "")
.toLowerCase()
.includes(currentProject.toLowerCase())
)
: []
.filter(s =>
(s.project || "")
.toLowerCase()
.includes(currentProject.toLowerCase())
);

document.getElementById("investors").innerText =
stakes.length;

renderHistory();

}

/* ===============================
ADD LIQUIDITY
=============================== */

function addLiquidity(){

const amount =
document.getElementById("addAmount").value;

const res =
addProjectLiquidity(currentProject, amount);

if(res?.error){
alert(res.error);
return;
}

alert("Liquidity added");
updateDashboard();

}

/* ===============================
WITHDRAW
=============================== */

function withdrawLiquidity(){

const amount =
document.getElementById("withdrawAmount").value;

const res =
projectInternalWithdraw(currentProject, amount);

if(res?.error){
alert(res.error);
return;
}

alert("Liquidity withdrawn");
updateDashboard();

}

/* ===============================
HISTORY
=============================== */

function renderHistory(){

if(typeof getLedger!=="function") return;

const history =
getLedger()
.filter(tx=>tx.project===currentProject);

const div =
document.getElementById("history");

div.innerHTML="";

history.reverse().forEach(tx=>{

div.innerHTML += `
<div class="tx">
<div>${tx.type}</div>
<div>${Number(tx.amount).toFixed(2)} Pi</div>
</div>
`;

});

}

function getProjectType(name){

const CORE = [

"Barsh Agro",
"Labbaika Bakery",
"Raheem Pharma",
"Urban Transport",
"Khairat Recycling",
"Azman Chemical",
"Hauwal Maize"

];

const project =
(name || "").toLowerCase();

if(CORE
.map(p=>p.toLowerCase())
.includes(project)){

return "Internal Project"; // Core yanzu ya zama Internal

}

return "Internal Project"; // Duk sauran internal

}

function uploadProjectUpdate(){

const project =
localStorage.getItem(
"albukhr_current_project"
);

const file =
document.getElementById(
"projectUpdateImage"
).files[0];

const text =
document.getElementById(
"projectUpdateText"
).value;

if(!file) return;

const reader =
new FileReader();

reader.onload=function(){

let feed =
JSON.parse(
localStorage.getItem(
"albukhr_project_feed"
)
)||[];

feed.push({

id:"update_"+Date.now(),

project:project,

type:getProjectType(project),

image:reader.result,

description:text,

time:Date.now()

});

localStorage.setItem(
"albukhr_project_feed",
JSON.stringify(feed)
);

window.dispatchEvent(
new Event("projectFeedUpdated")
);

alert("Project update uploaded");

};

reader.readAsDataURL(file);

}
 
/* ===============================
START
=============================== */

document.addEventListener("DOMContentLoaded",function(){

updateDashboard();

/* ADD THIS HERE */
if(typeof renderProjectStakeUI === "function"){
  renderProjectStakeUI(
    currentProject,
    localStorage.getItem("albukhr_current_email")
  );
}

});

</script>

</body>
</html>
