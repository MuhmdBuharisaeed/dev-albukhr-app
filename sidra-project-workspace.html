<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sidra Workspace — Albukhr</title>

<link rel="stylesheet" href="css/global-header.css">

<style>

body{
margin:0;
background:#f4f7f6;
font-family:system-ui;
padding-bottom:60px;
}

.header{
background:#0f7a3d;
color:#fff;
padding:16px;
font-weight:700;
}

.container{
padding:16px;
}

.card{
background:#fff;
padding:16px;
border-radius:16px;
margin-bottom:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.title{
font-weight:700;
margin-bottom:8px;
}

textarea{

width:100%;

padding:10px;

border-radius:10px;

border:1px solid #ddd;

margin-top:8px;

min-height:80px;

}

button{

margin-top:10px;

padding:10px;

border:none;

border-radius:10px;

background:#0f7a3d;

color:#fff;

font-weight:600;

cursor:pointer;

width:100%;

}

.task{

background:#f4f7f6;

padding:8px;

border-radius:8px;

margin-top:6px;

font-size:13px;

}

</style>

</head>

<body>

<div class="header">
Sidra Project Workspace
</div>

<div class="container">

<!-- PROJECT INFO -->

<div class="card">

<div class="title">
Project
</div>

<div id="projectName"></div>

</div>

<!-- PROJECT PROGRESS -->

<div class="card">

<div class="title">
Project Progress
</div>

<div style="
height:8px;
background:#eee;
border-radius:10px;
overflow:hidden;
margin-top:8px;
">

<div 
id="progressBar"
style="
height:100%;
width:0%;
background:#0f7a3d;
">
</div>

</div>

<div 
id="progressText"
style="
font-size:12px;
margin-top:6px;
color:#666;
">
0%
</div>

<button onclick="increaseProgress()">
Update Progress
</button>

</div>

<!-- TEAM -->

<div class="card">

<div class="title">
Team Assignment
</div>

<input 
id="teamInput"
placeholder="Add team member"
/>

<button onclick="addTeam()">
Add Member
</button>

<div id="teamList"></div>

</div>

<!-- MILESTONES -->

<div class="card">

<div class="title">
Milestones
</div>

<input 
id="milestoneInput"
placeholder="Add milestone"
/>

<button onclick="addMilestone()">
Add Milestone
</button>

<div id="milestoneList"></div>

</div>

<!-- FUNDING -->

<div class="card">

<div class="title">
Funding Tracker
</div>

<input 
id="fundInput"
placeholder="Add funding"
/>

<button onclick="addFunding()">
Add Funding
</button>

<div id="fundingTotal"></div>

</div>

<!-- NOTES -->

<div class="card">

<div class="title">
Developer Notes
</div>

<textarea
id="notes"
placeholder="Write build notes..."
></textarea>

<button onclick="saveNotes()">
Save Notes
</button>

</div>


<!-- TASKS -->

<div class="card">

<div class="title">
Project Tasks
</div>

<input 
id="taskInput"
placeholder="New task"
style="width:100%;padding:10px;border-radius:10px;border:1px solid #ddd;"
>

<button onclick="addTask()">
Add Task
</button>

<div id="tasks"></div>

</div>


</div>


<script>

const index =
localStorage.getItem(
"albukhr_sidra_active"
);

let projects =
JSON.parse(
localStorage.getItem(
"albukhr_sidra_projects"
)
)||[];

const project =
projects[index];

document.getElementById("projectName")
.innerText = project.name;


/* NOTES */

document.getElementById("notes").value =
project.notes || "";

function saveNotes(){

projects[index].notes =
document.getElementById("notes").value;

localStorage.setItem(
"albukhr_sidra_projects",
JSON.stringify(projects)
);

alert("Saved");

}


/* TASKS */

function renderTasks(){

const container =
document.getElementById("tasks");

container.innerHTML="";

(project.tasks || [])
.forEach((t,i)=>{

container.innerHTML += `

<div class="task">
${t}
</div>

`;

});

}

/* =========================
PROGRESS
========================= */

function increaseProgress(){

if(!projects[index].progress)
projects[index].progress = 0;

projects[index].progress += 10;

if(projects[index].progress > 100)
projects[index].progress = 100;

saveProjects();
renderProgress();

}

function renderProgress(){

const progress =
projects[index].progress || 0;

document.getElementById("progressBar")
.style.width = progress + "%";

document.getElementById("progressText")
.innerText = progress + "%";

}


/* =========================
TEAM
========================= */

function addTeam(){

const input =
document.getElementById("teamInput");

if(!projects[index].team)
projects[index].team=[];

projects[index].team.push(input.value);

input.value="";

saveProjects();
renderTeam();

}

function renderTeam(){

const div =
document.getElementById("teamList");

div.innerHTML="";

(projects[index].team || [])
.forEach(t=>{

div.innerHTML += `
<div class="task">
👤 ${t}
</div>
`;

});

}


/* =========================
MILESTONE
========================= */

function addMilestone(){

const input =
document.getElementById("milestoneInput");

if(!projects[index].milestones)
projects[index].milestones=[];

projects[index].milestones.push(input.value);

input.value="";

saveProjects();
renderMilestones();

}

function renderMilestones(){

const div =
document.getElementById("milestoneList");

div.innerHTML="";

(projects[index].milestones || [])
.forEach(m=>{

div.innerHTML += `
<div class="task">
🎯 ${m}
</div>
`;

});

}


/* =========================
FUNDING
========================= */

function addFunding(){

const input =
document.getElementById("fundInput");

const amount =
Number(input.value);

if(!projects[index].funding)
projects[index].funding=0;

projects[index].funding += amount;

input.value="";

saveProjects();
renderFunding();

}

function renderFunding(){

const fund =
projects[index].funding || 0;

document.getElementById("fundingTotal")
.innerText = fund + " Pi";

}


/* =========================
SAVE
========================= */

function saveProjects(){

localStorage.setItem(
"albukhr_sidra_projects",
JSON.stringify(projects)
);

}


/* =========================
LOAD
========================= */

renderProgress();
renderTeam();
renderMilestones();
renderFunding();

function addTask(){

const input =
document.getElementById("taskInput");

const text =
input.value;

if(!text) return;

if(!projects[index].tasks)
projects[index].tasks=[];

projects[index].tasks.push(text);

localStorage.setItem(
"albukhr_sidra_projects",
JSON.stringify(projects)
);

input.value="";

renderTasks();

}

renderTasks();

</script>

</body>
</html>
