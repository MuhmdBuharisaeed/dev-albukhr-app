<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Albukhr Project Builder</title>

<style>

body{
font-family:system-ui;
background:#f4f7f6;
margin:0;
padding:16px;
}

.card{
background:#fff;
padding:16px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.title{
font-size:18px;
font-weight:700;
margin-bottom:10px;
}

.label{
font-size:13px;
font-weight:600;
margin-top:10px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

button{
margin-top:14px;
padding:12px;
border:none;
background:#0f7a3d;
color:#fff;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.notice{
margin-top:12px;
font-size:13px;
color:#0f7a3d;
}

</style>

</head>

<body>

<div class="card">

<div class="title">📈 Project Investment Setup</div>

<div class="label">Project Name</div>
<input id="projectName">

<div class="label">Description</div>
<textarea id="projectDescription"></textarea>

<div class="label">Expected ROI (%)</div>
<input type="number" id="projectROI">

<div class="label">Initial Liquidity (Pi)</div>
<input type="number" id="initialLiquidity">

<div class="label">Minimum Investment (Pi)</div>
<input type="number" id="minimumInvestment">

<div class="label">Target Funding (Pi)</div>
<input type="number" id="targetFunding">

<button onclick="createProject()">
Launch Project
</button>

<div id="done" class="notice" style="display:none">
✅ Project successfully created
</div>

</div>

<script src="project-creation-engine.js"></script>
<script src="capital-protection-engine.js"></script>
<script src="js/ownership-engine.js"></script>

<script>

(function(){

const email = localStorage.getItem("albukhr_current_email");

if(!email) return;

const locked = localStorage.getItem(
"albukhr_project_creation_locked_" + email
);

if(locked){

document.body.innerHTML = `
<div style="padding:30px;font-family:system-ui">

<h2>🚫 Project Already Created</h2>

<p>
Your project has already been approved.
</p>

<p>
Access your dashboard from contributor panel.
</p>

</div>
`;

}

})();

/* ====================================
   VERIFY CONTRIBUTOR
==================================== */

function getCurrentContributor(){

const email =
localStorage.getItem("albukhr_current_email");

if(!email){

alert("Login required");

window.location.href =
"submit-albukhrecosystem-form.html";

return null;

}

return email;

}

/* ====================================
   CREATE PROJECT
==================================== */

function createProject(){

const creator = getCurrentContributor();

if(!creator) return;

const name =
document.getElementById("projectName").value.trim();

const description =
document.getElementById("projectDescription").value.trim();

const roi =
Number(document.getElementById("projectROI").value);

const liquidity =
Number(document.getElementById("initialLiquidity").value);

const minimum =
Number(document.getElementById("minimumInvestment").value);

const target =
Number(document.getElementById("targetFunding").value);

document.getElementById("projectName").value="";
document.getElementById("projectDescription").value="";
document.getElementById("projectROI").value="";
document.getElementById("initialLiquidity").value="";
document.getElementById("minimumInvestment").value="";
document.getElementById("targetFunding").value="";

/* ===== VALIDATION ===== */

if(!name || !description){

alert("Please complete required fields");

return;

}

if(liquidity <= 0){

alert("Initial liquidity required");

return;

}

if(roi > 40){

alert("ROI too high. Safety limit is 40%");

return;

}

/* ===== CAPITAL PROTECTION ===== */

if(typeof validateProjectROI === "function"){

const check = validateProjectROI(roi);

if(!check.allowed){

alert(check.reason);

return;

}

}

/* ===== PROJECT OBJECT ===== */

const project = {

id: "PRJ-" + Date.now(),

name: name,

description: description,

roi: roi,

initialLiquidity: liquidity,

minimum: minimum || 1,

target: target || 1000,

creator: creator,

type: "internal",

status: "project_pending",

createdAt: Date.now()

};

/* ====================================
   SAVE TO INTERNAL PROJECT REGISTRY
==================================== */

const KEY = "albukhr_internal_projects";

let list =
JSON.parse(localStorage.getItem(KEY)) || [];

list.push({

id: project.id,

projectName: project.name,

summary: project.description,

roi: project.roi,

initialLiquidity: project.initialLiquidity,

minimum: project.minimum,

target: project.target,

creatorEmail: project.creator,

category: "Investment",

stage: "Concept",

role: "Founder",

risk: "Pending",

confidentiality: "Internal",

status: "internal_pending",

createdAt: Date.now(),

approvedAt: null

});

localStorage.setItem(
KEY,
JSON.stringify(list)
);

/* ===== SUCCESS MESSAGE ===== */

document.getElementById("done").style.display="block";

document.getElementById("done").innerHTML =
"⏳ Project submitted for admin review";

}

</script>

</body>
</html>
