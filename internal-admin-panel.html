<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALBUKHR – Internal Project Admin</title>

<script src="admin-auth.js"></script>

<script>

/* =====================================
   ADMIN ACCESS GUARD
===================================== */

requireRole([
"super_admin",
"finance_admin",
"review_admin"
]);

const admin = getAdmin();

if(!admin){
window.location.href="admin-login.html";
}

</script>

<style>

body{
background:#f4f7f5;
font-family:system-ui
}

.section{
padding:16px
}

.card{
background:#fff;
border-radius:14px;
padding:14px;
margin-bottom:14px
}

h3,h4{
margin:4px 0
}

.badge{
display:inline-block;
padding:4px 10px;
font-size:11px;
border-radius:20px;
font-weight:700
}

.pending{
background:#fff4cc;
color:#8a6d00
}

.approved{
background:#e6f7ee;
color:#0f7a3d
}

.rejected{
background:#fdecea;
color:#b00020
}

.btn{
padding:8px 12px;
border:none;
border-radius:8px;
font-size:12px;
font-weight:700;
margin-right:6px;
cursor:pointer
}

.approve{
background:#0f7a3d;
color:#fff
}

.reject{
background:#b00020;
color:#fff
}

select{
padding:6px;
border-radius:6px;
border:1px solid #ccc;
font-size:12px
}

small{
font-size:12px;
color:#555
}

</style>

</head>

<body>

<section class="section">

<h3>🛂 Internal Project Admin Panel</h3>

<p style="font-size:13px">
Manage all ALBUKHR internal projects
</p>

<div id="projectList"></div>

</section>

<script src="albukhr-project-deployment-engine.js"></script>
<script src="internal-registry.js"></script>
<script src="project-registry.js"></script>
<script src="project-creation-engine.js"></script>
<script src="js/project-intelligence-engine.js"></script>
<script src="js/ownership-engine.js"></script>

<script>

/* =====================================
   STORAGE
===================================== */

function getInternalProjects(){

return JSON.parse(
localStorage.getItem("albukhr_internal_projects")
) || [];

}

function saveInternalProjects(list){

localStorage.setItem(
"albukhr_internal_projects",
JSON.stringify(list)
);

}

/* =====================================
   RENDER ADMIN PANEL
===================================== */

const container = document.getElementById("projectList");

function renderAdmin(){

const list = getInternalProjects();

container.innerHTML="";

if(!list.length){

container.innerHTML="<p>No internal projects found.</p>";

return;

}

list.slice().reverse().forEach(p=>{

const div = document.createElement("div");

div.className="card";

let badgeClass="pending";
let badgeText="Pending Review";

if(p.status==="internal_approved"){
badgeClass="approved";
badgeText="Approved";
}

if(p.status==="internal_rejected"){
badgeClass="rejected";
badgeText="Rejected";
}

const intel =
typeof analyzeProject === "function"
? analyzeProject(p)
: null;

div.innerHTML=`

<h4>${p.projectName}</h4>

<small>
${p.category || "General"} • ${p.stage || "Concept"}
</small>

<br>

<span class="badge ${badgeClass}">
${badgeText}
</span>

<p style="font-size:13px;margin-top:8px">

<b>Owner:</b> ${p.creatorName || "-"}<br>

<b>Risk:</b> ${p.risk || "N/A"}<br>

<b>ROI:</b> ${p.roi || 0}%<br>

<b>Initial Liquidity:</b> ${(p.initialLiquidity || 0)} Pi<br><br>

<div style="margin-top:10px;font-size:12px;background:#f6fbf8;padding:10px;border-radius:10px">

<b>Project Intelligence</b><br>

Risk Level: ${intel ? intel.risk : "N/A"}<br>

Liquidity Safety: ${intel ? intel.liquiditySafety : "0"}%<br>

ROI Pressure: ${intel ? intel.roiPressure : "N/A"}<br>

Sustainability Score: ${intel ? intel.score : "0"}/100

</div>

</p>

<details style="margin-top:6px">

<summary style="cursor:pointer;font-size:12px">
View Project Description
</summary>

<div style="font-size:13px;margin-top:8px">

<b>Project Summary</b><br>
${p.summary || p.description || "-"}

<br><br>

<b>Problem Statement</b><br>
${p.problem || "-"}

<br><br>

<b>Solution / Innovation</b><br>
${p.solution || "-"}

<br><br>

<b>Expected Impact</b><br>
${p.impact || "-"}

</div>

</details>

${
p.status==="internal_pending"
?

`
<div style="margin-top:10px">

<button class="btn approve"
onclick="approveProject('${p.id}')">

Approve

</button>

<button class="btn reject"
onclick="rejectProject('${p.id}')">

Reject

</button>

<select onchange="changeStage('${p.id}',this.value)">

<option value="">Change Stage</option>

<option>Concept</option>
<option>Pilot</option>
<option>Active</option>
<option>Scaling</option>

</select>

</div>
`

: ""

}

`;

container.appendChild(div);

});

}

/* =====================================
   APPROVE PROJECT
===================================== */

function approveProject(id){

if(confirm("Approve this internal project?")){

updateInternalStatus(id,"internal_approved");

const list = getInternalProjects();

const project = list.find(p => p.id === id);

/* =====================================
AUTO DEPLOY PROJECT
===================================== */

if(project && typeof deployInternalProject === "function"){
deployInternalProject(project);
}

/* fallback */

const deployed =
JSON.parse(
localStorage.getItem("albukhr_deployed_projects")
) || [];

const exists =
deployed.find(
p=>p.projectName === project.projectName
);

if(!exists && project){

deployed.push({

projectName: project.projectName,
creator: project.creatorEmail,
roi: project.roi || 0,
initialLiquidity: project.initialLiquidity || 0,
type: "internal",
createdAt: Date.now(),
status: "active"

});

localStorage.setItem(
"albukhr_deployed_projects",
JSON.stringify(deployed)
);

}

if(project){

project.projectApproved = true;

localStorage.setItem(
"albukhr_project_owner_" + project.creatorEmail,
project.projectName
);

localStorage.setItem(
"albukhr_project_dashboard_unlocked_" + project.creatorEmail,
true
);

localStorage.setItem(
"albukhr_project_creation_locked_" + project.creatorEmail,
true
);

localStorage.setItem(
"albukhr_current_project",
project.projectName
);

localStorage.setItem(
"albukhr_internal_projects",
JSON.stringify(list)
);

}

/* REGISTER TO MARKETPLACE */

if(project && typeof registerProject === "function"){

registerProject({
name: project.projectName,
description: project.summary || project.description,
roi: project.roi || 0,
liquidity: project.initialLiquidity || 0,
type: "internal",
minimum: 1,
target: 1000
});

if(typeof registerProjectOwner === "function"){
registerProjectOwner(
project.projectName,
project.email
);
}

}

renderAdmin();

}

}

/* =====================================
   REJECT PROJECT
===================================== */

function rejectProject(id){

if(!confirm("Reject this project?"))
return;

const list = getInternalProjects();

const project = list.find(p=>p.id===id);

if(!project) return;

project.status="internal_rejected";

saveInternalProjects(list);

renderAdmin();

}

/* =====================================
   CHANGE STAGE
===================================== */

function changeStage(id,stage){

if(!stage) return;

const list = getInternalProjects();

const project = list.find(p=>p.id===id);

if(!project) return;

project.stage = stage;

saveInternalProjects(list);

renderAdmin();

}

/* =====================================
   INIT
===================================== */

renderAdmin();

</script>

</body>
</html>
