/* ===============================
GLOBAL
================================*/

/* ===============================
HEADER

padding:0 16px;

justify-content:space-between;

/* ===============================
TIMELINE

.timeline-card{

border-radius:16px;

/* ===============================
HEADER
================================*/

.timeline-header{
display:flex;
justify-content:space-between;
align-items:center;

}

.timeline-project{

}

padding:4px 8px;

background:#e8f5ee;

}


/* ===============================
IMAGE PREVIEW
================================*/

.image-wrapper{
height:180px;
overflow:hidden;
border-radius:12px;
margin-top:6px;
}

.timeline-image{
width:100%;
height:100%;
object-fit:cover;
cursor:pointer;
transition:.25s ease;
}

.timeline-image:hover{
transform:scale(1.03);
}


/* ===============================
DESCRIPTION
================================*/

.timeline-desc{
font-size:13px;
margin-top:8px;
color:#444;
line-height:1.4;
word-break:break-word;
}

.read-more{
color:#0f7a3d;
font-size:12px;
font-weight:600;
margin-top:4px;
cursor:pointer;
}

.timeline-desc.collapsed{
display:-webkit-box;
-webkit-line-clamp:3;
-webkit-box-orient:vertical;
overflow:hidden;
}

.timeline-desc.expanded{
-webkit-line-clamp:unset;
overflow:visible;
}

/* ===============================
LIKE / DISLIKE
================================*/

.timeline-actions{
display:flex;
gap:12px;
margin-top:10px;
}

.timeline-actions button{
border:none;
background:#f4f7f6;
padding:6px 12px;
border-radius:10px;
cursor:pointer;
font-size:12px;
display:flex;
align-items:center;
gap:4px;
transition:.2s ease;
}

.timeline-actions button:hover{
background:#e9f7ef;
}

.timeline-actions button.active{
background:#0f7a3d;
color:#fff;
}


/* ===============================
COMMENTS
================================*/

.comment-box{
display:flex;
gap:8px;
margin-top:10px;
}

.comment-box input{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid #e5e5e5;
font-size:12px;
}

.comment-box button{
background:#0f7a3d;
color:#fff;
border:none;
padding:10px 14px;
border-radius:10px;
font-size:12px;
cursor:pointer;
}

.comment-list{
margin-top:8px;
font-size:12px;
color:#444;
display:flex;
flex-direction:column;
gap:6px;
}


/* ===============================
TIME
================================*/

.timeline-time{
font-size:11px;
color:#888;
margin-top:8px;
}


/* ===============================
IMAGE MODAL
================================*/

.image-modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.image-modal img{
max-width:95%;
max-height:90%;
border-radius:12px;
}


/* ===============================
EMPTY FEED
================================*/

.empty-feed{
text-align:center;
font-size:13px;
color:#777;
padding:40px 0;
   }

.comments-hidden{
display:none;
}

.comment-item{
background:#f4f7f6;
padding:8px;
border-radius:8px;
font-size:12px;
line-height:1.4;
}

.comment-preview{
background:#f4f7f6;
padding:8px;
border-radius:8px;
font-size:12px;
margin-bottom:6px;
}

.read-more-comments{
color:#0f7a3d;
font-size:12px;
font-weight:600;
margin-top:6px;
cursor:pointer;
}

.timeline-time-top{
font-size:11px;
color:#888;
margin-top:2px;
}

/* ===============================
PROJECT TYPES
================================ */

.core-badge{
background:#e8f5ee;
color:#0f7a3d;
}

.internal-badge{
background:#e8f5ee;
color:#0f7a3d;
}

.external-badge{
background:#e3f2fd;
color:#1976d2;
}
</style>

<script>

let lastScroll = 0;
let threshold = 10;

const dock =
document.querySelector(".dock-nav");

window.addEventListener("scroll",()=>{

const current =
window.pageYOffset;

if(Math.abs(current-lastScroll)<=threshold)
return;

if(current > lastScroll){

/* scroll down */
dock.classList.add("hide");

}else{

/* scroll up */
dock.classList.remove("hide");

}

lastScroll = current;

});

</script>

<script>

const withdrawSuccessBox =
document.getElementById("withdrawSuccessBox");

let lastWithdrawTime = 0;

window.addEventListener("walletUpdated", function(e){

if(!e.detail) return;

const data = e.detail;

/* Capital withdraw only */
if(data.type === "capital-withdraw"){

const now = Date.now();

if(now - lastWithdrawTime < 1000) return;

lastWithdrawTime = now;

showWithdrawSuccess();

}

});

function showWithdrawSuccess(){

withdrawSuccessBox.style.display = "block";

withdrawSuccessBox.textContent =
"Capital Withdraw Successful ✓";

setTimeout(()=>{

withdrawSuccessBox.style.display = "none";

},4000);

}

</script>

<script>
const current = location.pathname.split("/").pop();

document.querySelectorAll(".dock-item").forEach(link=>{

    link.classList.add("active");
  }
});
</script>
  
<script>

function truncateComment(text){

if(text.length > 60){
return text.substring(0,60) + "...";
}

return text;

}


function openCommentsPage(id){

localStorage.setItem(
"albukhr_active_comment",
id
);

window.location.href =
"comments-section.html";

}

document.addEventListener("DOMContentLoaded", function(){

let openComments = {};

/* =========================
   RENDER FEED
========================= */

function timeAgo(time){

const seconds =
Math.floor((Date.now() - time) / 1000);

let interval =
Math.floor(seconds / 31536000);

if(interval >= 1){
return interval + " year" + (interval>1?"s":"") + " ago";
}

interval =
Math.floor(seconds / 2592000);

if(interval >= 1){
return interval + " month" + (interval>1?"s":"") + " ago";
}

interval =
Math.floor(seconds / 86400);

if(interval >= 1){
return interval + " day" + (interval>1?"s":"") + " ago";
}

interval =
Math.floor(seconds / 3600);

if(interval >= 1){
return interval + " hour" + (interval>1?"s":"") + " ago";
}

interval =
Math.floor(seconds / 60);

if(interval >= 1){
return interval + " minute" + (interval>1?"s":"") + " ago";
}

return "Just now";

}

function renderFeed(){

const feed =
JSON.parse(
localStorage.getItem("albukhr_project_feed")
) || [];

const container =
document.getElementById("projectFeed");

container.innerHTML="";

if(!feed.length){

container.innerHTML=
"<div class='empty-feed'>No project updates yet</div>";

return;

}

const likes =
JSON.parse(localStorage.getItem("albukhr_likes")) || {};

const dislikes =
JSON.parse(localStorage.getItem("albukhr_dislikes")) || {};

const userVotes =
JSON.parse(localStorage.getItem("albukhr_user_votes")) || {};

const comments =
JSON.parse(localStorage.getItem("albukhr_comments")) || {};

feed
.sort((a,b)=>b.time-a.time)
.forEach(item=>{

const card =
document.createElement("div");

card.className="timeline-card";

card.innerHTML = `

<div class="timeline-header">

<div>

<div class="timeline-project">
${item.project}
</div>

<div class="timeline-time-top">
${timeAgo(item.time)}
</div>

</div>

<div class="timeline-type ${getTypeClass(item.type)}">
${item.type === "External Project" 
? "External Project" 
: "Internal Project"}
</div>

</div>


<div class="image-wrapper">

<img 
src="${item.image}"
class="timeline-image"
onclick="openImage('${item.image}')"
/>

</div>


<div 
class="timeline-desc collapsed" 
id="desc-${item.id}"
>
${item.description || ""}
</div>


${(item.description || "").length > 120 ? `

<div 
class="read-more"
onclick="toggleReadMore('${item.id}')"
id="read-${item.id}"
>
Read more
</div>

` : ""}



<div class="timeline-actions">

<button 
class="${userVotes[item.id]==='like'?'active':''}"
onclick="toggleLike('${item.id}')"
>
👍 ${likes[item.id] || 0}
</button>

<button 
class="${userVotes[item.id]==='dislike'?'active':''}"
onclick="toggleDislike('${item.id}')"
>
👎 ${dislikes[item.id] || 0}
</button>

<button
onclick="toggleComments('${item.id}')"
>
💬 ${(comments[item.id] || []).length}
</button>

</div>


<div 
class="comment-box"
style="display:${openComments[item.id] ? 'flex' : 'none'}"
id="comments-${item.id}"
>

<input
placeholder="Write comment..."
id="comment-${item.id}"
>

<button
onclick="addComment('${item.id}')">
Post
</button>

</div>


<div class="comment-list">

${(comments[item.id] || [])
.slice(0,3)
.map(c=>`

<div class="comment-preview">
💬 ${truncateComment(c.text)}
</div>

`)
.join("")}


${(comments[item.id] || []).length > 3 ? `

<div 
class="read-more-comments"
onclick="openCommentsPage('${item.id}')"
>

Read more comments

</div>

` : ""}

</div>

`;

container.appendChild(card);

});

   }


/* =========================
   LIKE / DISLIKE
========================= */

window.toggleLike = function(id){

let likes =
JSON.parse(localStorage.getItem("albukhr_likes"))||{};

let dislikes =
JSON.parse(localStorage.getItem("albukhr_dislikes"))||{};

let votes =
JSON.parse(localStorage.getItem("albukhr_user_votes"))||{};

if(votes[id]==="like"){

likes[id]--;
delete votes[id];

}else{

likes[id]=(likes[id]||0)+1;

if(votes[id]==="dislike"){
dislikes[id]--;
}

votes[id]="like";

}

localStorage.setItem("albukhr_likes",JSON.stringify(likes));
localStorage.setItem("albukhr_dislikes",JSON.stringify(dislikes));
localStorage.setItem("albukhr_user_votes",JSON.stringify(votes));

renderFeed();

}


window.toggleDislike = function(id){

let likes =
JSON.parse(localStorage.getItem("albukhr_likes"))||{};

let dislikes =
JSON.parse(localStorage.getItem("albukhr_dislikes"))||{};

let votes =
JSON.parse(localStorage.getItem("albukhr_user_votes"))||{};

if(votes[id]==="dislike"){

dislikes[id]--;
delete votes[id];

}else{

dislikes[id]=(dislikes[id]||0)+1;

if(votes[id]==="like"){
likes[id]--;
}

votes[id]="dislike";

}

localStorage.setItem("albukhr_likes",JSON.stringify(likes));
localStorage.setItem("albukhr_dislikes",JSON.stringify(dislikes));
localStorage.setItem("albukhr_user_votes",JSON.stringify(votes));

renderFeed();

}


/* =========================
   COMMENT
========================= */

window.addComment = function(id){

const input =
document.getElementById("comment-"+id);

const text =
input.value.trim();

if(!text) return;

let comments =
JSON.parse(
localStorage.getItem("albukhr_comments")
)||{};

if(!comments[id])
comments[id]=[];

comments[id].push({
text,
time:Date.now()
});

localStorage.setItem(
"albukhr_comments",
JSON.stringify(comments)
);

input.value="";

renderFeed();

}


/* =========================
   IMAGE MODAL
========================= */

window.openImage = function(src){

document.getElementById("imageModal")
.style.display="flex";

document.getElementById("modalImg")
.src = src;

}

window.closeImage = function(){

document.getElementById("imageModal")
.style.display="none";

}

function getTypeClass(type){

if(type === "Internal Project")
return "internal-badge";

if(type === "External Project")
return "external-badge";

/* Default -> Internal */
return "internal-badge";

   }

/* =========================
   READ MORE
========================= */

window.toggleReadMore = function(id){

const desc =
document.getElementById("desc-"+id);

const btn =
document.getElementById("read-"+id);

if(desc.classList.contains("collapsed")){

desc.classList.remove("collapsed");
desc.classList.add("expanded");

btn.innerText = "Show less";

}else{

desc.classList.remove("expanded");
desc.classList.add("collapsed");

btn.innerText = "Read more";

}

}

window.toggleComments = function(id){

openComments[id] = !openComments[id];

renderFeed();

}

/* =========================
   EVENTS
========================= */

window.addEventListener(
"projectFeedUpdated",
renderFeed
);

window.addEventListener(
"storage",
renderFeed
);


/* START */

renderFeed();

});

</script>
