<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Albukhr News</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="css/global-header.css">
<link rel="stylesheet" href="global-buttons.css">

<style>

html,body{
margin:0;
padding:0;
font-family:system-ui;
background:#f4f7f6;
padding-bottom:140px;
}

/* ===== NEWS SECTION ===== */

.section{
padding:16px;
}

/* Skeleton loader */

.skeleton{

height:180px;

border-radius:16px;

margin-bottom:14px;

background:linear-gradient(90deg,#eee,#f5f5f5,#eee);

background-size:200% 100%;

animation:shimmer 1.5s infinite;
}

@keyframes shimmer{

0%{background-position:200% 0;}

100%{background-position:-200% 0;}

}

/* ===== NEWS CARD ===== */

.news-card{

background:#fff;

border-radius:18px;

padding:14px;

margin-bottom:16px;

box-shadow:0 8px 20px rgba(0,0,0,0.06);

transition:.25s ease;

cursor:pointer;
}

.news-card:hover{
transform:translateY(-3px);
}

.news-media{

width:100%;

border-radius:14px;

overflow:hidden;

margin-bottom:10px;
}

.news-media img,
.news-media video{

width:100%;

display:block;

border-radius:14px;
}

.news-title{

font-size:15px;

font-weight:700;

margin-bottom:6px;
}

.news-summary{

font-size:13px;

color:#444;

margin-bottom:8px;
}

.news-meta{

display:flex;

justify-content:space-between;

align-items:center;

font-size:11px;

color:#777;
}

.source-badge{

background:#e6f6ec;

padding:4px 8px;

border-radius:20px;

font-weight:600;

color:#0f7a3d;
}

.verified-badge{

background:#0f7a3d;

color:#fff;

padding:3px 8px;

border-radius:20px;

font-size:10px;

margin-left:6px;
}

</style>

</head>

<body data-page="news">

<!-- ===== ALBUKHR HEADER ===== -->

<header class="header">

  <div class="header-left">
  <span class="brand">ALBUKHR</span>
  </div>

<div class="header-right">

<div class="header-btn notification-btn" onclick="openNotifications()">

🔔

<span id="notifBadge" class="notification-badge"></span>

</div>

</div>

</header>

<!-- ===== NEWS CONTENT ===== -->

<section class="section">

<div id="newsContainer">

<div class="skeleton"></div>
<div class="skeleton"></div>

</div>

</section>

<!-- ACTIVE NAV -->

<script>

const current = location.pathname.split("/").pop();

document.querySelectorAll(".dock-item").forEach(link=>{

if(link.getAttribute("href") === current){

link.classList.add("active");

}

});

</script>

<!-- NEWS DATA -->

<script src="news-data.js"></script>

<script>

async function renderNews(){

const container=document.getElementById("newsContainer");

container.innerHTML="";

const news=await getAllNews();

if(!news.length){

container.innerHTML="<p>No news available</p>";

return;

}

news.forEach(item=>{

const div=document.createElement("div");

div.className="news-card";

div.innerHTML=`

${
item.image || item.video
? `
<div class="news-media">
${
item.video
? `<video controls src="${item.video}"></video>`
: `<img src="${item.image}" alt="news image">`
}
</div>`
: ""
}

<div class="news-title">

${item.title}

${
item.verified
? `<span class="verified-badge">Verified</span>`
: ""
}

</div>

<div class="news-summary">

${item.summary || ""}

</div>

<div class="news-meta">

<div class="source-badge">${item.source}</div>

<div>${new Date(item.date).toLocaleDateString()}</div>

</div>

`;

div.onclick=()=>window.open(item.link,"_blank");

container.appendChild(div);

});

}

renderNews();

</script>

<script src="js/notifications.js"></script>

</body>
</html>
