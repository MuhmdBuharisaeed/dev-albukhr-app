<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sidra Admin — Albukhr</title>

<link rel="stylesheet" href="css/global-header.css">

<style>

body{
margin:0;
background:#f4f7f6;
font-family:system-ui;
}

.header{
background:#0f7a3d;
color:#fff;
padding:16px;
font-weight:700;
}

.container{
padding:16px;
}

.card{
background:#fff;
padding:16px;
border-radius:16px;
margin-bottom:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.title{
font-weight:700;
margin-bottom:8px;
}

.row{
font-size:13px;
margin-top:6px;
color:#555;
}

.actions{
margin-top:12px;
display:flex;
gap:8px;
}

button{

flex:1;

padding:10px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:600;

}

.approve{
background:#0f7a3d;
color:#fff;
}

.reject{
background:#ddd;
}

.empty{
text-align:center;
color:#777;
padding:40px;
}

.history-card{

background:#fff;

padding:12px;

border-radius:12px;

margin-bottom:10px;

box-shadow:0 4px 14px rgba(0,0,0,0.04);

font-size:12px;

}

</style>

</head>

<body>

<div class="header">
Sidra Applications — Admin
</div>

<div class="container" id="applications"></div>

<div class="header">
Admin Activity History
</div>

<div 
class="container" 
id="adminHistory"
></div>

<script>

function render(){

const container =
document.getElementById("applications");

const list =
JSON.parse(
localStorage.getItem("albukhr_sidra_applications")
)||[];

container.innerHTML="";

if(!list.length){

container.innerHTML =
"<div class='empty'>No Applications</div>";

return;

}

list.reverse().forEach((item,index)=>{

const card =
document.createElement("div");

card.className="card";

card.innerHTML = `

<div class="title">
${item.name}
</div>

<div class="row">
Priority: ${item.priority || "Pending"}
</div>

<div class="row">
Type: ${item.type}
</div>

<div class="row">
${item.desc}
</div>

<div class="row">
Goal: ${item.goal || "N/A"}
</div>

<div class="row">
Email: ${item.email || "N/A"}
</div>

<div class="row" style="margin-top:10px">
Admin Note
</div>

<textarea
id="note-${index}"
placeholder="Write admin review..."
style="
width:100%;
margin-top:6px;
padding:8px;
border-radius:8px;
border:1px solid #ddd;
font-size:12px;
"
></textarea>


<div class="row">
Project Score (1-10)
</div>

<input
type="number"
id="score-${index}"
min="1"
max="10"
placeholder="Score"
/>

<div class="actions">

<button 
class="approve"
onclick="approve(${index})"
>

Approve

</button>

<button
class="reject"
onclick="reject(${index})"
>

Reject

</button>

</div>

`;

container.appendChild(card);

});

}

function saveHistory(action,project){

let history =
JSON.parse(
localStorage.getItem("albukhr_sidra_admin_history")
)||[];

history.unshift({

action:action,

project:project,

time:new Date().toLocaleString()

});

localStorage.setItem(
"albukhr_sidra_admin_history",
JSON.stringify(history)
);

renderHistory();

}

function renderHistory(){

const container =
document.getElementById("adminHistory");

if(!container) return;

const list =
JSON.parse(
localStorage.getItem(
"albukhr_sidra_admin_history"
)
)||[];

container.innerHTML="";

list.slice(0,20).forEach(item=>{

const div =
document.createElement("div");

div.className="history-card";

div.innerHTML = `

<div>
<b>${item.action}</b>
</div>

<div>
${item.project}
</div>

<div style="color:#888">
${item.time}
</div>

`;

container.appendChild(div);

});

  }

/* APPROVE */

function approve(i){

let apps =
JSON.parse(
localStorage.getItem("albukhr_sidra_applications")
)||[];

let approved =
JSON.parse(
localStorage.getItem("albukhr_sidra_projects")
)||[];

const note =
document.getElementById("note-"+i).value;

const score =
document.getElementById("score-"+i).value;

const project = apps[i];

project.adminNote = note || "";
project.score = score || 5;

/* PRIORITY */

if(project.score >=8){
project.priority="High";
}
else if(project.score >=5){
project.priority="Medium";
}
else{
project.priority="Low";
}

/* LOG HISTORY */

saveHistory("Approved",project.name);

approved.push(project);

let my =
JSON.parse(
localStorage.getItem(
"albukhr_sidra_my_request"
)
);

if(my && my.id === project.id){

my.status = "approved";
my.adminNote = project.adminNote;
my.priority = project.priority;
my.score = project.score;

localStorage.setItem(
"albukhr_sidra_my_request",
JSON.stringify(my)
);

}

apps.splice(i,1);

localStorage.setItem(
"albukhr_sidra_applications",
JSON.stringify(apps)
);

localStorage.setItem(
"albukhr_sidra_projects",
JSON.stringify(approved)
);

rankProjects();

alert("Approved");

render();
renderHistory();

  }

/* REJECT */

function reject(i){

let apps =
JSON.parse(
localStorage.getItem("albukhr_sidra_applications")
)||[];

const note =
document.getElementById("note-"+i).value;

const project = apps[i];

project.adminNote = note || "Rejected";

/* LOG HISTORY */

saveHistory("Rejected",project.name);

let my =
JSON.parse(
localStorage.getItem(
"albukhr_sidra_my_request"
)
);

if(my && my.id === project.id){

my.status = "rejected";
my.adminNote = project.adminNote;

localStorage.setItem(
"albukhr_sidra_my_request",
JSON.stringify(my)
);

}

apps.splice(i,1);

localStorage.setItem(
"albukhr_sidra_applications",
JSON.stringify(apps)
);

render();
renderHistory();

  }

function rankProjects(){

let projects =
JSON.parse(
localStorage.getItem("albukhr_sidra_projects")
)||[];

projects.sort((a,b)=>{

return (b.score || 0) - (a.score || 0);

});

localStorage.setItem(
"albukhr_sidra_projects",
JSON.stringify(projects)
);

  }

render();

renderHistory();

rankProjects();

</script>

</body>
</html>
