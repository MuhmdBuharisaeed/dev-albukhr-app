<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Albukhr Ecosystem Control Center</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#f4f7f6;
padding-bottom:80px;
}

.header{
background:#0f7a3d;
color:white;
padding:16px;
font-weight:700;
}

.container{
padding:16px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-bottom:16px;
}

.card{
background:#fff;
padding:16px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.big{
font-size:22px;
font-weight:800;
color:#0f7a3d;
}

.row{
display:flex;
justify-content:space-between;
font-size:13px;
margin-top:6px;
}

.project-card{
background:#fff;
padding:16px;
border-radius:14px;
margin-bottom:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

button{
margin-top:8px;
padding:8px 12px;
border:none;
border-radius:8px;
background:#0f7a3d;
color:#fff;
cursor:pointer;
}

.pause{
background:#b83232;
}

</style>

</head>

<body>

<div class="header">
ALBUKHR Ecosystem Control Center
</div>

<div class="container">

<div class="grid">

<div class="card">
<div>Total Projects</div>
<div class="big" id="totalProjects">0</div>
</div>

<div class="card">
<div>Total Liquidity</div>
<div class="big" id="totalLiquidity">0 Pi</div>
</div>

<div class="card">
<div>Total Investors</div>
<div class="big" id="totalInvestors">0</div>
</div>

<div class="card">
<div>Total Reserve</div>
<div class="big" id="totalReserve">0 Pi</div>
</div>

</div>

<div id="projectList"></div>

<h3 style="margin-top:25px">Economic Intelligence</h3>

<div id="economicPanel"></div>

<h3 style="margin-top:20px">Treasury Requests</h3>

<div id="treasuryRequests"></div>

</div>

<script src="admin-auth.js"></script>
<script src="project-registry.js"></script>
<script src="smart-liquidity-engine.js"></script>
<script src="staking.js"></script>
<script src="albukhr-treasury-engine.js"></script>
<script src="albukhr-economic-intelligence-engine.js"></script>
<script src="albukhr-project-deployment-engine.js"></script>

<script>
/* ===============================
   ADMIN AUTH GUARD
================================ */

document.addEventListener("DOMContentLoaded", function(){

if(typeof requireRole === "function"){
requireRole([
"super_admin",
"ecosystem_admin"
]);
}

if(typeof getAdmin === "function" && !getAdmin()){
window.location.href = "admin-login.html";
return;
}

});
  
function renderControlCenter(){

const projects =
typeof getProjects === "function"
? getProjects()
: [];

const stakes =
typeof getAllStakesMerged === "function"
? getAllStakesMerged()
: [];

let totalLiquidity = 0;
let totalReserve = 0;

projects.forEach(project => {

const treasury =
getProjectTreasuryStatus(project.name);

totalLiquidity += treasury.liquidity || 0;
totalReserve += treasury.reserve || 0;

});

document.getElementById("totalProjects").innerText =
projects.length;

document.getElementById("totalLiquidity").innerText =
totalLiquidity.toFixed(2) + " Pi";

document.getElementById("totalInvestors").innerText =
stakes.length;

document.getElementById("totalReserve").innerText =
totalReserve.toFixed(2) + " Pi";

renderProjects(projects);

}

function renderTreasuryRequests(){

const container =
document.getElementById("treasuryRequests");

const requests =
JSON.parse(localStorage.getItem(TREASURY_REQUEST_KEY)) || [];

container.innerHTML = "";

if(!requests.length){

container.innerHTML =
"<div style='font-size:13px;color:#777'>No treasury requests</div>";

return;

}

requests.slice().reverse().forEach(req => {

const div =
document.createElement("div");

div.className = "project-card";

div.innerHTML = `

<b>${req.project}</b>

<div class="row">
<div>Amount</div>
<div>${req.amount} Pi</div>
</div>

<div class="row">
<div>Reason</div>
<div>${req.reason}</div>
</div>

<div class="row">
<div>Status</div>
<div>${req.status}</div>
</div>

<button onclick="approveTreasuryFunding('${req.id}')">
Approve
</button>

<button class="pause"
onclick="rejectTreasuryFunding('${req.id}')">
Reject
</button>

`;

container.appendChild(div);

});

}

function renderEconomicPanel(){

const container =
document.getElementById("economicPanel");

if(!container) return;

const liquidityPriority =
typeof getLiquidityPriority === "function"
? getLiquidityPriority(3)
: [];

const profitProjects =
typeof getTopProfitProjects === "function"
? getTopProfitProjects(3)
: [];

const riskProjects =
typeof getHighRiskProjects === "function"
? getHighRiskProjects(3)
: [];

container.innerHTML = `

<div class="card">

<b>Projects Needing Liquidity</b>

<br><br>

${liquidityPriority.map(p=>`
<div class="row">
<div>${p.project}</div>
<div>${p.liquidityNeed}</div>
</div>
`).join("")}

</div>

<div class="card" style="margin-top:10px">

<b>Top Profit Projects</b>

<br><br>

${profitProjects.map(p=>`
<div class="row">
<div>${p.project}</div>
<div>${p.profitScore}</div>
</div>
`).join("")}

</div>

<div class="card" style="margin-top:10px">

<b>High Risk Projects</b>

<br><br>

${riskProjects.map(p=>`
<div class="row">
<div>${p.project}</div>
<div>${p.risk}</div>
</div>
`).join("")}

</div>

`;

}

function approveTreasuryFunding(requestId){

const requests =
JSON.parse(localStorage.getItem(TREASURY_REQUEST_KEY)) || [];

const req =
requests.find(r => r.id === requestId);

if(!req) return {error:"Request not found"};

if(req.status !== "pending")
return {error:"Already processed"};

const treasury = getEcosystemTreasury();

if(treasury.balance < req.amount){
return {error:"Treasury insufficient"};
}

/* execute funding */

treasury.balance -= req.amount;

saveEcosystemTreasury(treasury);

addProjectLiquidity(req.project, req.amount);

req.status = "approved";

localStorage.setItem(
TREASURY_REQUEST_KEY,
JSON.stringify(requests)
);

return {success:true};

}

function rejectTreasuryFunding(requestId){

const requests =
JSON.parse(localStorage.getItem(TREASURY_REQUEST_KEY)) || [];

const req =
requests.find(r => r.id === requestId);

if(!req) return;

req.status = "rejected";

localStorage.setItem(
TREASURY_REQUEST_KEY,
JSON.stringify(requests)
);

}

function renderProjects(projects){

const container =
document.getElementById("projectList");

container.innerHTML = "";

projects.forEach(project => {

const treasury =
getProjectTreasuryStatus(project.name);

const investors =
typeof getAllStakesMerged === "function"
? getAllStakesMerged()
.filter(s => s.project === project.name).length
: 0;

const div =
document.createElement("div");

div.className = "project-card";

div.innerHTML = `

<b>${project.name}</b>

<div class="row">
<div>Liquidity</div>
<div>${treasury.liquidity.toFixed(2)} Pi</div>
</div>

<div class="row">
<div>Reserve</div>
<div>${treasury.reserve.toFixed(2)} Pi</div>
</div>

<div class="row">
<div>Investors</div>
<div>${investors}</div>
</div>

<button onclick="openProject('${project.name}')">
Open Dashboard
</button>

<button class="pause"
onclick="pauseProject('${project.name}')">
Pause Project
</button>

`;

container.appendChild(div);

});

}

function openProject(name){

localStorage.setItem(
"albukhr_current_project",
name
);

window.location.href =
"Albukhr-internal-project-dashboard.html";

}

function pauseProject(name){

alert("Project paused: " + name);

}

renderControlCenter();
renderTreasuryRequests();
renderEconomicPanel();

setInterval(()=>{
renderControlCenter();
renderTreasuryRequests();
renderEconomicPanel();
},5000);

</script>

</body>
</html>
