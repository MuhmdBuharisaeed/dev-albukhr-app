<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albukhr Admin – Transactions</title>

<link rel="stylesheet" href="style.css">

<style>
.admin-wrap{
  padding:16px;
  max-width:1000px;
  margin:0 auto;
}

.admin-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.admin-header h2{
  font-size:18px;
  color:#0f7a3d;
}

.filter-bar{
  display:flex;
  gap:8px;
  margin-bottom:12px;
}

.filter-bar select,
.filter-bar input{
  padding:8px 10px;
  border-radius:8px;
  border:1px solid #cceedd;
  font-size:13px;
}

.tx-table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  border-radius:12px;
  overflow:hidden;
}

.tx-table th,
.tx-table td{
  padding:10px;
  font-size:12px;
  text-align:left;
  border-bottom:1px solid #eee;
}

.tx-table th{
  background:#eaf6ee;
  color:#0f7a3d;
  font-weight:600;
}

.badge{
  padding:3px 8px;
  border-radius:10px;
  font-size:11px;
  font-weight:600;
}

.badge.internal{background:#e0f3e8;color:#0f7a3d}
.badge.external{background:#fff3cd;color:#856404}
.badge.core{background:#e7f1ff;color:#084298}

.status-ok{color:#0f7a3d;font-weight:600}
.status-frozen{color:#b02a37;font-weight:600}
.status-refunded{color:#6c757d;font-weight:600}

.empty{
  text-align:center;
  font-size:13px;
  color:#777;
  padding:20px;
}

.high-risk{
background:#fff5f5;
border-left:4px solid #e74c3c;
}

.medium-risk{
background:#fff9e6;
}
</style>
</head>

<body>

<header class="header">
  <h1 class="brand">ALBUKHR • Admin</h1>
</header>

<div class="admin-wrap">

  <div class="admin-header">
    <h2>Unified Transactions</h2>
    <button onclick="adminLogout()">Logout</button>
  </div>

  <!-- FILTERS -->
  <div class="filter-bar">
    <select id="sourceFilter">
      <option value="">All Sources</option>
      <option value="internal">Internal</option>
      <option value="external">External</option>
      <option value="core">Core</option>
    </select>

    <input id="projectFilter" placeholder="Project ID">
  </div>

  <div id="txAlert"
style="
display:none;
background:#c0392b;
color:white;
padding:10px;
margin-bottom:10px;
border-radius:8px;
font-weight:700;
">
⚠️ High Risk Transaction Detected
  </div>

  <!-- TABLE -->
  <table class="tx-table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Source</th>
        <th>Project</th>
        <th>User</th>
        <th>Amount (Pi)</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="txBody"></tbody>
  </table>

</div>

<!-- =============================
     AUTH (LOAD FIRST)
============================= -->
<script src="admin-auth.js"></script>
<script>
requireRole([
  "super_admin",
  "finance_admin",
  "viewer_admin"
]);

</script>

<!-- CORE ENGINE -->
<script src="transactions-unified.js"></script>

<script>
const body = document.getElementById("txBody");
const sourceFilter = document.getElementById("sourceFilter");
const projectFilter = document.getElementById("projectFilter");

function checkTxRisk(txs){

const alert =
document.getElementById("txAlert");

const risky =
txs.some(t => Number(t.amount) >= 500);

if(risky){
alert.style.display = "block";
}else{
alert.style.display = "none";
}

}

function renderTable(){

const source = sourceFilter.value;
const project = projectFilter.value.toLowerCase();

let txs = [];

if(typeof getAllTransactionsUnified === "function"){
txs = getAllTransactionsUnified();
}

if(source){
txs = txs.filter(t => t.source === source);
}

if(project){
txs = txs.filter(t =>
(t.projectId || "").toLowerCase().includes(project)
);
}

body.innerHTML = "";

if(txs.length === 0){

checkTxRisk([]);

body.innerHTML =
`<tr>
<td colspan="6" class="empty">
No transactions found
</td>
</tr>`;

return;
}

txs.forEach(t=>{

const d = new Date(t.timestamp);

const date =
d.toLocaleDateString() + " " +
d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});

body.innerHTML += `
<tr class="${getRiskClass(t)}">
<td>${date}</td>
<td><span class="badge ${t.source}">${t.source}</span></td>
<td>${t.projectId || "-"}</td>
<td>${t.user || "-"}</td>
<td>${Number(t.amount || 0).toFixed(2)} Pi</td>
<td class="${statusClass(t.status)}">${t.status}</td>
</tr>
`;

});

checkTxRisk(txs);

  }

function getRiskClass(tx){

const amount = Number(tx.amount || 0);

if(amount >= 500){
return "high-risk";
}

if(amount >= 200){
return "medium-risk";
}

return "";

 }

function statusClass(s){
  if(s === "Successful") return "status-ok";
  if(s === "frozen") return "status-frozen";
  if(s === "refunded") return "status-refunded";
  return "";
}

sourceFilter.addEventListener("change", renderTable);
projectFilter.addEventListener("input", renderTable);

renderTable();

setInterval(renderTable, 4000);
</script>

</body>
</html>
