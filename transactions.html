<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALBUKHR – Transactions</title>

<link rel="stylesheet" href="style.css">

<style>
body{
  background:#f5f7f6;
  margin:0;
  padding-bottom:90px;
  font-family:system-ui;
}

/* ===== HEADER (ALBUKHR STANDARD) ===== */
.header{
  background:#0f7a3d;
  height:60px;
  padding:0 16px;
  display:flex;
  align-items:center;
}

.header-left{
  display:flex;
  align-items:center;
  gap:8px;
}

.main-logo{
  height:40px;
}

.header-title{
  color:#fff;
  font-weight:700;
  font-size:15px;
}

/* ===== SECTION ===== */
.section{padding:16px}

/* ===== TRANSACTION CARD ===== */
.project-tx{
  background:#fff;
  border-radius:12px;
  padding:10px 12px;
  margin-bottom:8px;
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  transition:.2s ease;
}

.project-tx:hover{
  transform:translateY(-2px);
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

.project-icon{
  width:32px;
  height:32px;
  border-radius:50%;
  background:#e6f6ec;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
}

.project-body{flex:1}

.project-title{
  font-size:13px;
  font-weight:600;
}

.project-date{
  font-size:11px;
  color:#777;
}

.project-right{
  text-align:right;
}

.project-amount{
  font-size:13px;
  font-weight:700;
}

.positive{color:#0f7a3d}
.negative{color:#c0392b}

.project-status{
  font-size:10px;
  margin-top:4px;
  color:#777;
}

/* ===== MODAL ===== */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

.modal{
  background:#fff;
  width:90%;
  max-width:420px;
  border-radius:14px;
  padding:18px;
}

.detail-row{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin:6px 0;
}

.modal-actions{
  margin-top:12px;
  display:flex;
  gap:8px;
}

.btn{
  flex:1;
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
  font-weight:600;
}

.btn-primary{
  background:#0f7a3d;
  color:#fff;
}

.btn-light{
  background:#eee;
}

.brand-name{
  font-size: 28px;
  font-weight: bold;
  color: white;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<header class="header">

  <div class="header-left">
  <span class="brand">ALBUKHR</span>
  </div>
  
</header>

<section class="section">
  <div id="txList"></div>
</section>

<div class="modal-overlay" id="txModal">
  <div class="modal">
    <h3>Transaction Details</h3>
    <div id="txDetails"></div>

    <div class="modal-actions">
      <button class="btn btn-primary" onclick="downloadReceipt()">Download</button>
      <button class="btn btn-primary" onclick="shareReceipt()">Share</button>
      <button class="btn btn-light" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script src="staking.js"></script>
<script src="wallet-core.js"></script>
<script src="js/unified-transactions.js"></script>

<script>
const txList = document.getElementById("txList");
const txModal = document.getElementById("txModal");
const txDetails = document.getElementById("txDetails");

let activeTx = null;

const ICONS = {
  Raheem:"💊",
  Hauwal:"🌽",
  Barsh:"🌾",
  Khairat:"♻️",
  Azman:"🧪",
  Urban:"🚍",
  Labbaika:"🍞"
};

/* ===== HELPERS ===== */

function safeNumber(val){
  const n = Number(val);
  return isNaN(n) ? 0 : n;
}

function generateReference(ts){
  return "ALB-" + (Number(ts) || Date.now());
}

/* ===== LOAD TRANSACTIONS ===== */

function loadTransactions(){

  txList.innerHTML = "";

  if(typeof getAllStakesMerged!=="function"){
    txList.innerHTML="<p style='font-size:12px;color:#777'>Staking engine not found</p>";
    return;
  }

  const stakes = getAllStakesMerged() || [];

  const stakeTx = stakes.map(s=>({
      type:"stake",
      project:s.project,
      amount:safeNumber(s.amount),
      timestamp:Number(s.timestamp)
  }));

  const withdrawTx = (typeof getWithdrawHistory==="function")
    ? getWithdrawHistory().map(w=>({
        type:w.type==="capital"?"capital-withdraw":"reward-withdraw",
        project:w.project,
        amount:safeNumber(w.grossAmount||w.amount),
        received:safeNumber(w.received||w.amount),
        wallet:w.walletAddress||"Internal Wallet",
        timestamp:Number(w.timestamp)
      }))
    : [];

  const merged = [...stakeTx,...withdrawTx]
      .sort((a,b)=>b.timestamp-a.timestamp);

  if(!merged.length){
    txList.innerHTML="<p style='font-size:12px;color:#777'>No transactions yet</p>";
    return;
  }

  merged.forEach(tx=>{
    const div=document.createElement("div");
    div.className="project-tx";
    div.onclick=()=>openModal(tx);

    const date=new Date(tx.timestamp);

    const isStake = tx.type==="stake";

    div.innerHTML=`
      <div class="project-icon">
        ${ICONS[tx.project]||"📦"}
      </div>

      <div class="project-body">
        <div class="project-title">
          ${tx.project} ${tx.type.replace("-"," ")}
        </div>
        <div class="project-date">
          ${date.toLocaleDateString()} • ${date.toLocaleTimeString()}
        </div>
      </div>

      <div class="project-right">
        <div class="project-amount ${isStake?'positive':'negative'}">
          ${isStake?'+':'-'}${safeNumber(tx.amount).toFixed(2)} Pi
        </div>
        <div class="project-status">
          Completed
        </div>
      </div>
    `;

    txList.appendChild(div);
  });
}

/* ===== MODAL ===== */

function openModal(tx){
  activeTx=tx;
  const date=new Date(tx.timestamp);
  const ref=generateReference(tx.timestamp);

  txDetails.innerHTML=`
    <div class="detail-row"><span>Project</span><span>${tx.project}</span></div>
    <div class="detail-row"><span>Type</span><span>${tx.type}</span></div>
    <div class="detail-row"><span>Amount</span><span>${safeNumber(tx.amount).toFixed(2)} Pi</span></div>
    <div class="detail-row"><span>Date</span><span>${date.toLocaleString()}</span></div>
    <div class="detail-row"><span>Reference</span><span>${ref}</span></div>
  `;

  txModal.style.display="flex";
}

function closeModal(){
  txModal.style.display="none";
}

function downloadReceipt(){
  if(!activeTx) return;
  const ref=generateReference(activeTx.timestamp);
  const text=`Albukhr Receipt
Reference: ${ref}
Project: ${activeTx.project}
Type: ${activeTx.type}
Amount: ${safeNumber(activeTx.amount).toFixed(2)} Pi
Date: ${new Date(activeTx.timestamp).toLocaleString()}
`;
  const blob=new Blob([text],{type:"text/plain"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=ref+".txt";
  a.click();
}

function shareReceipt(){
  if(!activeTx) return;
  if(navigator.share){
    navigator.share({
      title:"Albukhr Receipt",
      text:`${activeTx.project} - ${safeNumber(activeTx.amount).toFixed(2)} Pi`
    });
  }else{
    alert("Sharing not supported");
  }
}

window.addEventListener("walletUpdated", loadTransactions);
window.addEventListener("DOMContentLoaded", loadTransactions);
</script>

</body>
</html>
